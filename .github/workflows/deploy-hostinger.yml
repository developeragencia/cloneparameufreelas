name: Deploy Hostinger
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ vars.SSH_PORT }}
          script: |
            set -e
            mkdir -p ${{ vars.APP_DIR }}
            if [ -d "${{ vars.APP_DIR }}/.git" ]; then
              cd ${{ vars.APP_DIR }}
              git fetch origin ${{ vars.BRANCH }}
              git reset --hard origin/${{ vars.BRANCH }}
            else
              git clone https://github.com/developeragencia/cloneparameufreelas.git ${{ vars.APP_DIR }}
              cd ${{ vars.APP_DIR }}
              git checkout ${{ vars.BRANCH }}
            fi
            cd ${{ vars.APP_DIR }}
            npm ci --no-audit --no-fund
            npx prisma generate
            npm run build
            if ! command -v pm2 >/dev/null 2>&1; then
              npm i -g pm2
            fi
            pm2 describe meufreelas >/dev/null 2>&1 && pm2 restart meufreelas --update-env || pm2 start "npm start" --name meufreelas --update-env
            pm2 save
